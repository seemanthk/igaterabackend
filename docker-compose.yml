services:
  frontend:
    image: igaterafrontend-frontend:latest
    container_name: igatera-frontend
    ports:
      - "3000:80"
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:8000/api}
      - VITE_WS_BASE_URL=${VITE_WS_BASE_URL:-ws://localhost:8000/api}
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
